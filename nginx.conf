# nginx config for a fully-static Nextra 3 site.
#
# Notes
# - We serve everything from /usr/share/nginx/html. The build produces
#   index.html per route; nginx's `try_files` handles clean URLs.
# - _next/static is content-hashed. We set 1-year immutable cache on
#   it. The HTML itself is 0-cache so deploys show up immediately.
# - Sub-route fallback: a deep link like /live-data/events has to map
#   to /live-data/events/index.html. Nextra builds the path as a
#   directory with index.html in it; `try_files` already does the
#   right thing.
# - Gzip is on by default for text/* and application/javascript.
# - We do NOT gzip pre-compressed .br/.gz assets. The build emits
#   uncompressed HTML; nginx's dynamic gzip is fine for docs.

server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Default security headers; not strict — this is a docs site.
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;
  add_header Referrer-Policy strict-origin-when-cross-origin;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Long cache for hashed assets.
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Allow the search index (or any other root-level file) to be served
  # with a short cache so deploys land fast.
  location = / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  # All other routes: try the file, then the directory's index, then
  # fall back to the site root.
  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  # Hide dotfiles in case anyone mounts a volume that includes one.
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
